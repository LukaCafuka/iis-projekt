syntax = "proto3";

option csharp_namespace = "IIS.Contracts";

package weather;

service Weather {
  rpc GetTemperaturesByCity (CityFilter) returns (TemperatureReply);
}

message CityFilter {
  string city_part = 1;
}

message TemperatureReply {
  repeated CityTemperature entries = 1;
  string error_message = 2;
}

message CityTemperature {
  string city_name = 1;
  string temperature_c = 2;
  string description = 3;
}
